default_language_version:
  python: python3
exclude: 'dotnet'
ci:
  autofix_prs: true
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit suggestions'
  autoupdate_schedule: 'monthly'

repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # v6.0.0
  hooks:
  - id: check-added-large-files
    args: ["--maxkb=2000"]
  - id: check-ast
  - id: check-yaml
    args: ["--unsafe"]
  - id: check-toml
  - id: check-json
  - id: fix-byte-order-marker
    exclude: .gitignore
  - id: check-merge-conflict
  - id: detect-private-key
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: no-commit-to-branch
- repo: https://github.com/psf/black
  rev: c6755bb741b6481d6b3d3bb563c83fa060db96c9 # 26.3.1
  hooks:
  - id: black
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: aca6d4c8045a504e2812ea4bedff1d0a09e437bc # v0.15.8
  hooks:
  - id: ruff
    types_or: [python, pyi, jupyter]
    args: ["--fix", "--ignore=E402"]
- repo: https://github.com/jendrikseipp/vulture
  rev: b0f67ba0044693aa9ec0d38fe460590facc98004 # v2.16
  hooks:
  - id: vulture
    pass_filenames: false
    args: [".", "--min-confidence", "95", "--exclude", ".venv,venv,node_modules,.git,build,dist",
      "--ignore-names", "request"]                                                                                                 # or 100 if you want very high confidence only
    require_serial: true
- repo: https://github.com/codespell-project/codespell
  rev: 2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a # v2.4.2
  hooks:
  - id: codespell
    args: ["-L", "ans,linar,nam,tread,ot,callin,"]
    exclude: (?x)^(systems_manager/skills/git-cli-docs/reference/.*)$
- repo: https://github.com/PyCQA/bandit
  rev: 2d0b675b04c80ae42277e10500db06a0a37bae17 # 1.8.6
  hooks:
  - id: bandit
    args: ["--skip", "B101,B404,B603"]
    exclude: ^(tests/|test/|scripts/|script/|__tests__/)
- repo: https://github.com/nbQA-dev/nbQA
  rev: d31b7eae1767c43460afb3ba130e0a6602933abe # 1.9.1
  hooks:
  - id: nbqa-ruff
- repo: local
  hooks:
  - id: check-mermaid
    name: Check Mermaid syntax
    entry: bash -c 'python3 "${AGENT_UTILITIES_REPO:?configure agent-utilities repository}/scripts/mermaid_linter.py" "$@"' --
    language: system
    files: \.md$
    pass_filenames: true
  - id: check-stubs
    name: Check for Active Stubs and TODOs
    entry: bash -c 'python3 "${AGENT_UTILITIES_REPO:?configure agent-utilities repository}/scripts/check_stubs.py" "$@"' --
    language: system
    types: [python]
  - id: mermaid-validate
    name: mermaid-validate
    entry: mermaid-validate
    language: node
    additional_dependencies: ['@zabaca/mermaid-validate@1.0.1']
    types: [markdown]
    pass_filenames: true
  - id: check-agent-standards
    name: check agent standards
    entry: |-
      bash -c 'for f in $(find . -type f -name "agent_server.py" -not -path "*/\.venv/*" -not -path "*/__pycache__/*"); do grep -q "warnings.filterwarnings" "$f" && grep -q "file=sys.stderr" "$f" || { echo "Missing warnings.filterwarnings or file=sys.stderr in $f"; exit 1; }; done'
    language: system
    pass_filenames: false
    always_run: true
  - id: mcp-readme-table
    name: sync MCP tools table in README
    entry: |-
      bash -c 'if [ -f uv.lock ]; then uv run python -m agent_utilities.mcp.readme_tools; else python -m agent_utilities.mcp.readme_tools; fi'
    language: system
    files: ^(README\.md|.*/mcp_server\.py|.*/mcp/.*\.py)$
    pass_filenames: false
  - id: readme-env-vars
    name: sync env-vars table in README
    entry: |-
      bash -c 'if [ -f uv.lock ]; then uv run python -m agent_utilities.mcp.readme_env_vars; else python -m agent_utilities.mcp.readme_env_vars; fi'
    language: system
    files: ^(README\.md|\.env\.example)$
    pass_filenames: false
  - id: env-var-drift
    name: check env-var/config drift
    entry: bash -c 'if [ -f uv.lock ]; then uv run python -m agent_utilities.mcp.check_env_var_drift --check; else python -m agent_utilities.mcp.check_env_var_drift --check; fi'
    language: system
    pass_filenames: false
    files: ^(README\.md|\.env\.example|mcp_config.*\.json|.*/mcp_config.*\.json|docker/.*compose.*\.ya?ml|.*/auth\.py|.*/mcp_server\.py)$
  - id: check-cli-help
    name: check cli help
    entry: |-
      bash -c 'for f in $(find . -type f \( -name "mcp_server.py" -o -name "agent_server.py" \) -not -path "*/\.venv/*" -not -path "*/__pycache__/*"); do mod=$(echo "$f" | sed -e "s/^\.\///" -e "s/\.py$//" -e "s/\//./g"); uv run python -m "$mod" --help >/dev/null || exit 1; done'
    language: system
    pass_filenames: false
    always_run: true
  - id: check-bumpversion
    name: validate bumpversion config
    entry: |-
      bash -c 'if [ -f ".bumpversion.cfg" ]; then bump2version patch --dry-run --allow-dirty; fi'
    language: system
    pass_filenames: false
    always_run: true
- repo: https://github.com/AleksaC/hadolint-py
  rev: 458cb25edf664682e3e856a53a2f9af33e068297 # v2.14.0
  hooks:
  - id: hadolint
    args:
    - --ignore=DL3008
    - --ignore=DL3015
    - --ignore=DL3009
    - --ignore=DL4006
    - --ignore=SC2102
- repo: https://github.com/IamTheFij/docker-pre-commit
  rev: f626253b23de45412865c07fd076ff95d4cd77a7 # v3.0.1
  hooks:
  - id: docker-compose-check
- repo: local
  hooks:
  - id: security-sanitizer
    name: Security and Garbage Sanitizer
    entry: python scripts/security_sanitizer.py
    language: python
    pass_filenames: false
    always_run: true

[bumpversion]
current_version = 1.34.0
commit = True
tag = True

[bumpversion:file:pyproject.toml]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:README.md]
search = Version: {current_version}
replace = Version: {new_version}

[bumpversion:file(mcp-img):docker/Dockerfile]
search = systems-manager[mcp]>={current_version}
replace = systems-manager[mcp]>={new_version}

[bumpversion:file(agent-img):docker/Dockerfile]
search = systems-manager[agent]>={current_version}
replace = systems-manager[agent]>={new_version}

[bumpversion:file:systems_manager/agent_server.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"

[bumpversion:file:systems_manager/mcp_server.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"

[bumpversion:file:systems_manager/systems_manager.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"

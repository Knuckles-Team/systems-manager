---
services:
  systems-manager-agent:
    # image: docker.io/knucklessg1/systems-manager:latest
    build:
     context: . # Debug
     dockerfile: debug.Dockerfile
    container_name: systems-manager-agent
    hostname: systems-manager-agent
    command: [ "systems-manager-agent" ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    env_file:
      - .env
    environment:
      - "PYTHONUNBUFFERED=1"
      - "HOST=0.0.0.0"
      - "PORT=9933"
      - "TRANSPORT=stdio"
      - "PROVIDER=openai"
      - "LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234/v1}"
      - "LLM_API_KEY=${LLM_API_KEY:-llama}"
      - "MODEL_ID=${MODEL_ID:-qwen/qwen3.5-35b-a3b}"
      - "DEBUG=False"
      - "ENABLE_WEB_UI=True"
      - "ENABLE_OTEL=True"
    ports:
      - "9933:9933"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9933/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
